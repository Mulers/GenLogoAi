<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenLogoAi.com | AI 3D Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050811; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .bg-text { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.05; pointer-events: none; display: flex; flex-direction: column; justify-content: space-around; }
        .scroll { font-size: 5vw; font-weight: 900; white-space: nowrap; color: transparent; -webkit-text-stroke: 1px white; animation: move 40s linear infinite; }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .glass { background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); z-index: 10; position: relative; }
        #style-select option { background: #0f172a; color: #60a5fa; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-text">
        <div class="scroll">GENLOGOAI.COM • 3D GENERATION •</div>
        <div class="scroll" style="animation-direction: reverse;">PREMIUM QUALITY • SUBSCRIPTION PLAN •</div>
    </div>

    <div class="glass p-10 rounded-[40px] w-full max-w-lg text-center mx-4">
        <div class="flex justify-between items-center mb-8 bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20">
            <div class="text-left">
                <p class="text-[10px] font-bold text-blue-400 uppercase">Pro Access</p>
                <p class="text-lg font-black">$79.99<span class="text-xs font-normal">/mo</span></p>
            </div>
            <button id="sub-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold text-xs transition-all">UPGRADE 🚀</button>
        </div>

        <h1 class="text-3xl font-black text-blue-500 mb-6 italic">GENLOGOAI.COM</h1>

        <div class="border-2 border-dashed border-gray-800 rounded-3xl p-8 mb-6 cursor-pointer bg-black/20" id="drop-zone">
            <p id="file-name" class="text-gray-400">Upload (PNG, JPG, JFIF)</p>
            <input type="file" id="file-input" class="hidden" accept="image/*">
        </div>

        <select id="style-select" class="w-full bg-gray-950 border border-gray-800 rounded-2xl p-4 mb-6 text-blue-400 outline-none appearance-none cursor-pointer">
            <option value="gold">Luxury Gold (24K)</option>
            <option value="glass">Futuristic Glass</option>
            <option value="neon">Cyberpunk Neon</option>
        </select>

        <button id="gen-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold shadow-lg">GENERATE 3D ✨</button>

        <div id="result-area" class="mt-8 hidden border-t border-gray-800 pt-6">
            <img id="result-img" src="" class="max-w-[200px] mx-auto rounded-2xl mb-4 border border-white/5">
            <button id="pay-btn" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-bold">PAY $1.00 TO DOWNLOAD 💳</button>
        </div>
    </div>

    <script>
        const genBtn = document.getElementById('gen-btn');
        const payBtn = document.getElementById('pay-btn');
        const subBtn = document.getElementById('sub-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('file-name').innerText = fileInput.files[0].name; };

        // Generate
        genBtn.onclick = async () => {
            if (!fileInput.files[0]) return alert("Select file!");
            genBtn.disabled = true; genBtn.innerHTML = '<div class="loader"></div> PROCESSING...';
            
            const fd = new FormData();
            fd.append('image', fileInput.files[0]);
            fd.append('style', document.getElementById('style-select').value);

            try {
                const res = await fetch('http://127.0.0.1:5000/generate-3d', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.artifacts) {
                    document.getElementById('result-img').src = `data:image/png;base64,${data.artifacts[0].base64}`;
                    document.getElementById('result-area').classList.remove('hidden');
                }
            } catch (e) { alert("Server error!"); }
            finally { genBtn.disabled = false; genBtn.innerText = "GENERATE 3D ✨"; }
        };

        // One-time Pay
        payBtn.onclick = async () => {
            const res = await fetch('http://127.0.0.1:5000/create-checkout-session', { method: 'POST' });
            const data = await res.json();
            if (data.url) window.location.href = data.url;
        };

        // Monthly Subscription
        subBtn.onclick = async () => {
            const res = await fetch('http://127.0.0.1:5000/create-subscription', { method: 'POST' });
            const data = await res.json();
            if (data.url) window.location.href = data.url;
        };

        // Handle success
        const params = new URLSearchParams(window.location.search);
        if (params.get('payment') === 'success') alert("Thank you for your purchase!");
        if (params.get('plan') === 'pro') alert("You are now a PRO member!");
    </script>
</body>
</html>
